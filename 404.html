<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Page not found — Jack Hefner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="That page does not exist. Head back to Jack Hefner's SEO Data Analyst site.">
<meta name="theme-color" content="#F4F1EA">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<style>
:root{--paper:#F4F1EA;--ink:#1A1814;--ink-2:#3A352D;--accent:#C8853F;--accent-deep:#964F1E;--rule:#D9D2C3;
--serif:"Instrument Serif",Georgia,"Times New Roman",serif;
--sans:"Helvetica Neue",Helvetica,Arial,sans-serif;
--mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;}
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);
font-family:var(--sans);display:flex;align-items:center;justify-content:center;
padding:32px;line-height:1.5;-webkit-font-smoothing:antialiased;}
main{max-width:560px;}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2);margin:0;}
.eyebrow .dot{color:var(--accent);}
h1{font-family:var(--serif);font-weight:400;letter-spacing:-.02em;line-height:1;
font-size:clamp(52px,12vw,84px);margin:.18em 0 .12em;}
p{color:var(--ink-2);max-width:46ch;margin:0 0 1.4em;}
a.home{display:inline-flex;align-items:center;gap:.5em;font-family:var(--mono);font-size:13px;
letter-spacing:.04em;text-decoration:none;background:var(--accent);color:var(--ink);
border-radius:999px;padding:13px 22px;min-height:48px;}
a.home:hover{background:var(--accent-deep);color:var(--paper);}
a.home:focus-visible{outline:2px solid var(--accent-deep);outline-offset:2px;}
</style>
</head>
<body>
<main>
  <p class="eyebrow"><span class="dot" aria-hidden="true">●</span> 404 — Page not found</p>
  <h1>Nothing ranks here.</h1>
  <p>That page does not exist, or it moved. The optimization continues elsewhere.</p>
  <a class="home" href="/">Back to the homepage →</a>
</main>
</body>
</html>
